name: C/C++ CI

env:
  CI: true

on: [push, pull_request]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macOS-latest]

    steps:
    - uses: actions/checkout@v2
    - name: compile
      run: g++ -I ./GLEngine/vendor/include/ -g -D _GLFW_WIN32 $(find . -type f -iregex ".*\.cpp")
